<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quizApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <p class="start-title">click to start the quiz</p>
        <button class="start-button">start</button>
    </div>

    <div id="question-screen">
        <span class="question-class"></span>
        <div class="timer-class"></div>
        <div class="options-class">
            <button class="button-class">value1</button>
            <button class="button-class">value2</button>
            <button class="button-class">value3</button>
            <button class="button-class">value4</button>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-class"></div>
        <div class="retry-class">
            <button class="retry-button">retry</button>
            <div class="scoreboard-class"></div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
